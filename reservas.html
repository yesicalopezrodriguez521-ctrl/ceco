<style>

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f7f7f7;
}

/* HEADER */
header {
  background: white;
  text-align: center;
  padding: 20px;
}

header img {
  width: 200px;
}

/* NAV */
nav {

nav a {

.qr {
  display: flex;
  justify-content: center;
  margin: 30px 0;
}

.qr img {

  max-width: 90%;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);

/* FOOTER */
footer {
  background: black;
  color: white;
  text-align: center;
  padding: 20px;
  margin-top: 30px;
}

/* LOGO FOOTER */
footer .logos img {
  width: 1000px;
  height: auto;
  display: block;
  margin: 0 auto 10px auto;
}

/* REDES */
.redes a {
  color: white;
  margin: 0 8px;
  font-size: 20px;
  transition: 0.3s;
}

.redes a:hover {
