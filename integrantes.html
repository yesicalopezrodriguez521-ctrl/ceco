<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Integrantes - El Centollo</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css">

<style>

/* ===== GENERAL ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f7f7f7;
    color:#333;
}

/* ===== HEADER ===== */
header{
    background:white;
    text-align:center;
    padding:20px;
}

header img{
    width:180px;
}

/* ===== NAV ===== */
nav{
    background:black;
    text-align:center;
    padding:12px;
}

nav a{
    color:white;
    text-decoration:none;
    margin:10px;
    font-weight:bold;
}

nav a:hover{
    color:#ffd700;
}

/* ===== TITULO ===== */
.titulo{
    text-align:center;
    margin:25px 0;
    color:#003049;
}

/* ===== CONTENEDOR ===== */
.contenedor{
    max-width:700px;
    margin:auto;
    padding:20px;
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap:20px;
}

/* ===== TARJETAS ===== */
.card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

.card img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.card h3{
    margin:10px 0 5px;
    color:#111;
}

.card p{
    font-size:14px;
    padding:0 10px 15px;
    color:#666;
}

/* ===== FOOTER ===== */
footer{
    background:black;
    color:white;
    text-align:center;
    padding:40px 20px;
    margin-top:30px;
}

/* 🔥 LOGO FOOTER A 1000px (COMO PEDISTE) */
footer .logos img{
    width:1000px;
    height:auto;
    display:block;
    margin:10px auto;
}

/* REDES */
.redes {
    margin-top: 15px;
}

.redes a {
    color: white;
    font-size: 24px;
    margin: 0 10px;
    transition: 0.3s;
    display: inline-block;
}

.redes a:hover {
    color: #ffd166;
    transform: scale(1.2);
}

</style>

</head>

<body>

<header>
    <img src="img/logo.png" alt="Logo Centollo">
</header>

<nav>
    <a href="index.html">Inicio</a>
    <a href="menu.html">Menú</a>
    <a href="ubicacion.html">Ubicación</a>
    <a href="contacto.html">Contacto</a>
    <a href="reservas.html">Reservas</a>
</nav>

<h2 class="titulo">Integrantes del Proyecto</h2>

<section class="contenedor">

    <div class="card">
        <img src="img/integrante1.jpg" alt="Integrante 1">
        <h3>Yesica López</h3>
        <p>Diseño de la estructura HTML y organización de la página web.</p>
    </div>

    <div class="card">
        <img src="img/integrante2.jpg" alt="Integrante 2">
        <h3>Isabella Sarmiento</h3>
        <p>Estilos CSS, diseño visual y presentación del proyecto.</p>
    </div>

</section>

<footer>

<div class="logos">
    <img src="img/logo2.jpg" alt="Logo secundario">
</div>

<p>Yesica Jimena López – Isabella Sarmiento Piñeros</p>
<p>📧 centollo@gmail.com</p>

<div class="redes">
    <a href="#"><i class="fab fa-facebook-f"></i></a>
    <a href="#"><i class="fab fa-instagram"></i></a>
    <a href="#"><i class="fab fa-whatsapp"></i></a>
</div>

</footer>

</body>
</html>
